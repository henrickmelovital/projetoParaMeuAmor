<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Thainá ❤️</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap');

    body {
      margin: 0;
      overflow: hidden;
      background: #000; /* Fundo preto inicial para o foguete aparecer */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Quicksand', sans-serif;
      transition: background 2s ease;
    }

    /* Estilo do Cartão (começa invisível) */
    .card {
      text-align: center;
      z-index: 10;
      background: rgba(255, 255, 255, 0.2);
      padding: 50px;
      border-radius: 40px;
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      opacity: 0;
      transform: scale(0.8);
      transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
    }

    .card.visible {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    h1 {
      color: #fff;
      font-family: 'Dancing Script', cursive;
      font-size: 4.5rem;
      margin: 0;
      filter: drop-shadow(0 5px 15px rgba(255, 77, 109, 0.6));
    }

    /* Canvas para os fogos */
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
    }

    .music-control {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      background: rgba(255, 255, 255, 0.3);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      color: white;
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div class="card" id="mainCard">
    <h1>Eu te amo, Thainá ❤️</h1>
    <p style="color: white; opacity: 0.8;">Você faz meu mundo brilhar</p>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    // Ajusta tamanho do canvas
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Classe da Partícula do Fogete/Explosão
    class Particle {
      constructor(x, y, color, velocity, isHeart = false) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.velocity = velocity;
        this.alpha = 1;
        this.friction = 0.96;
        this.gravity = 0.15;
        this.isHeart = isHeart;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.restore();
      }

      update() {
        this.velocity.x *= this.friction;
        this.velocity.y *= this.friction;
        this.velocity.y += this.gravity;
        this.x += this.velocity.x;
        this.y += this.velocity.y;
        this.alpha -= 0.01;
      }
    }

    // Função para desenhar o formato de coração matemático
    function getHeartPoint(t) {
      const x = 16 * Math.sin(t) ** 3;
      const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
      return { x, y };
    }

    // Sequência da Animação
    function launchRocket() {
      const x = canvas.width / 2;
      let y = canvas.height;
      const targetY = canvas.height * 0.4;

      function animateLaunch() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#ff4d6d';
        ctx.fill();

        y -= 8;

        if (y > targetY) {
          requestAnimationFrame(animateLaunch);
        } else {
          explodeHeart(x, y);
        }
      }
      animateLaunch();
    }

    function explodeHeart(x, y) {
      // Cria partículas no formato de coração
      for (let i = 0; i < Math.PI * 2; i += 0.1) {
        const point = getHeartPoint(i);
        const velocity = {
          x: point.x * 0.5,
          y: point.y * 0.5
        };
        particles.push(new Particle(x, y, '#ff4d6d', velocity));
      }

      // Adiciona brilhos extras
      for (let i = 0; i < 50; i++) {
        particles.push(new Particle(x, y, '#fff', {
          x: (Math.random() - 0.5) * 15,
          y: (Math.random() - 0.5) * 15
        }));
      }

      animateExplosion();
      
      // Muda o fundo e mostra o card após a explosão
      setTimeout(() => {
        document.body.style.background = 'linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%)';
        document.getElementById('mainCard').classList.add('visible');
      }, 500);
    }

    function animateExplosion() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      particles.forEach((p, i) => {
        if (p.alpha > 0) {
          p.update();
          p.draw();
        } else {
          particles.splice(i, 1);
        }
      });

      if (particles.length > 0) {
        requestAnimationFrame(animateExplosion);
      } else {
        // Limpa o canvas para os efeitos de flutuação normais começarem
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        startFloatingHearts();
      }
    }

    // Corações flutuantes que você já tinha
    function startFloatingHearts() {
        setInterval(() => {
            const p = document.createElement("div");
            p.style.position = "fixed";
            p.style.bottom = "-20px";
            p.style.left = Math.random() * 100 + "vw";
            p.innerText = "❤️";
            p.style.fontSize = "20px";
            p.style.transition = "transform 5s linear, opacity 5s";
            p.style.pointerEvents = "none";
            p.style.zIndex = "1";
            document.body.appendChild(p);

            setTimeout(() => {
                p.style.transform = `translateY(-110vh) rotate(${Math.random() * 360}deg)`;
                p.style.opacity = "0";
            }, 100);

            setTimeout(() => p.remove(), 6000);
        }, 400);
    }

    // Inicia tudo
    window.onload = () => {
      setTimeout(launchRocket, 1000);
    };
  </script>
</body>
</html>
