<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Thainá ❤️</title>
  <style>
    /* Usando uma fonte mais romântica do Google Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500&display=swap');

    body {
      margin: 0;
      overflow: hidden;
      /* Gradiente mais suave e "rosinha" */
      background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Quicksand', sans-serif;
    }

    .container {
      text-align: center;
      z-index: 2;
      background: rgba(255, 255, 255, 0.3);
      padding: 40px;
      border-radius: 30px;
      backdrop-filter: blur(8px); /* Efeito de vidro fosco */
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .container:hover {
      transform: scale(1.05);
    }

    h1 {
      color: #ff4d6d;
      font-family: 'Dancing Script', cursive;
      font-size: 4rem;
      margin: 0;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
      animation: pulse 1.5s ease-in-out infinite;
    }

    p {
      color: #6c757d;
      font-size: 1.2rem;
      margin-top: 10px;
    }

    .heart {
      position: absolute;
      pointer-events: none;
      filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
      animation: floatUp linear forwards;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) rotate(0deg) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-20vh) rotate(360deg) scale(0.5);
        opacity: 0;
      }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="container" onclick="clickSurprise()">
    <h1>Eu te amo, Thainá ❤️</h1>
    <p>Clique aqui para mais amor!</p>
  </div>

  <script>
    // Lista de emojis fofos para variar
    const hearts = ["❤️", "💖", "💝", "✨", "🌸", "💕"];

    function createHeart(x = null) {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      
      // Seleciona um emoji aleatório da lista
      heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];

      // Se x for passado (no clique), usa o X do mouse, senão usa randômico
      heart.style.left = x ? x + "px" : Math.random() * 100 + "vw";
      
      // Começa sempre do fundo da tela
      heart.style.top = "100vh";
      
      heart.style.fontSize = (Math.random() * 25 + 15) + "px";
      heart.style.animationDuration = (Math.random() * 3 + 4) + "s";
      
      // Leve inclinação inicial
      heart.style.opacity = Math.random() * 0.5 + 0.5;

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }

    // Cria corações automaticamente
    setInterval(() => createHeart(), 400);

    // Surpresa ao clicar: solta vários corações de uma vez!
    function clickSurprise() {
      for(let i=0; i<15; i++) {
        setTimeout(() => {
          const randomX = Math.random() * window.innerWidth;
          createHeart(randomX);
        }, i * 50);
      }
    }
  </script>

</body>
</html>
