<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Thainá ❤️</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap');

    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Quicksand', sans-serif;
      perspective: 1000px;
    }

    /* Cartão interativo com efeito 3D ao passar o mouse */
    .card {
      text-align: center;
      z-index: 10;
      background: rgba(255, 255, 255, 0.25);
      padding: 50px;
      border-radius: 40px;
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.4);
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      transform-style: preserve-3d;
    }

    .card:hover {
      transform: rotateY(10deg) rotateX(5deg) scale(1.02);
      box-shadow: 0 30px 60px rgba(255, 77, 109, 0.2);
    }

    h1 {
      color: #fff;
      font-family: 'Dancing Script', cursive;
      font-size: 4.5rem;
      margin: 0;
      filter: drop-shadow(0 5px 15px rgba(255, 77, 109, 0.4));
      animation: floatText 3s ease-in-out infinite;
    }

    .message {
      color: #fff;
      font-size: 1.1rem;
      margin-top: 20px;
      opacity: 0.9;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Estilo dos elementos flutuantes */
    .particle {
      position: absolute;
      pointer-events: none;
      z-index: 1;
      animation: moveUp linear forwards;
    }

    @keyframes moveUp {
      0% { transform: translateY(110vh) rotate(0deg) scale(0); opacity: 0; }
      20% { opacity: 1; transform: translateY(80vh) rotate(90deg) scale(1.2); }
      100% { transform: translateY(-20vh) rotate(720deg) scale(0.5); opacity: 0; }
    }

    @keyframes floatText {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    /* Botão de Música */
    .music-control {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: rgba(255, 255, 255, 0.8);
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      cursor: pointer;
      z-index: 100;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      transition: 0.3s;
    }

    .music-control:hover { transform: scale(1.1); }
  </style>
</head>
<body onmousemove="spawnTrail(event)">

  <!-- Opcional: Link de uma música fofa (Lofi ou Instrumental) -->
  <audio id="bgMusic" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
  </audio>

  <button class="music-control" onclick="toggleMusic()">🎵</button>

  <div class="card" onclick="explosion(event)">
    <h1 id="title">Para Thainá</h1>
    <div class="message">Você é o meu melhor presente</div>
    <p style="color: white; font-weight: 300; margin-top: 30px;">(Toque na tela)</p>
  </div>

  <script>
    const colors = ["#FF4D6D", "#FF758F", "#FF8FA3", "#FFB3C1", "#FFCCD5"];
    const emojis = ["❤️", "💖", "✨", "🌸", "☁️", "💍"];

    // 1. Criação automática de partículas ao fundo
    function createParticle() {
      const p = document.createElement("div");
      p.className = "particle";
      p.innerText = emojis[Math.floor(Math.random() * emojis.length)];
      p.style.left = Math.random() * 100 + "vw";
      p.style.fontSize = Math.random() * 20 + 10 + "px";
      p.style.animationDuration = Math.random() * 5 + 5 + "s";
      p.style.color = colors[Math.floor(Math.random() * colors.length)];
      
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 10000);
    }
    setInterval(createParticle, 300);

    // 2. Efeito de rastro que segue o mouse
    function spawnTrail(e) {
      if (Math.random() > 0.8) { // Não criar sempre para não pesar
        const dot = document.createElement("div");
        dot.className = "particle";
        dot.innerText = "✨";
        dot.style.left = e.pageX + "px";
        dot.style.top = e.pageY + "px";
        dot.style.fontSize = "10px";
        dot.style.animation = "fadeAway 1s forwards";
        document.body.appendChild(dot);
        setTimeout(() => dot.remove(), 1000);
      }
    }

    // 3. Explosão de corações ao clicar
    function explosion(e) {
      for(let i=0; i<20; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.innerText = "❤️";
        p.style.left = e.pageX + "px";
        p.style.top = e.pageY + "px";
        p.style.transition = "all 1s ease-out";
        
        document.body.appendChild(p);
        
        // Direção aleatória da explosão
        const destX = (Math.random() - 0.5) * 500;
        const destY = (Math.random() - 0.5) * 500;
        
        requestAnimationFrame(() => {
          p.style.transform = `translate(${destX}px, ${destY}px) scale(0) rotate(360deg)`;
          p.style.opacity = "0";
        });

        setTimeout(() => p.remove(), 1000);
      }
    }

    // 4. Controle de música
    let playing = false;
    function toggleMusic() {
      const audio = document.getElementById("bgMusic");
      const btn = document.querySelector(".music-control");
      if (!playing) {
        audio.play().catch(() => alert("Clique na tela primeiro para tocar a música!"));
        btn.innerText = "⏸️";
      } else {
        audio.pause();
        btn.innerText = "🎵";
      }
      playing = !playing;
    }

    // Adiciona animação extra de fadeAway para o rastro
    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes fadeAway {
        0% { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(3) translateY(-20px); }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
